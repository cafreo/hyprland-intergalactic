# ‚Ėą‚Ėą‚ĖĄ ‚ĖĄ‚ĖÄ‚ĖĄ ‚ĖĄ‚ĖÄ‚ĖÄ ‚Ėą ‚ĖĄ‚ĖÄ‚ĖÄ ‚ĖĄ‚ĖÄ‚ĖÄ
# ‚Ėą‚ĖĄ‚Ėą ‚Ėą‚ĖÄ‚Ėą ‚ĖĄ‚Ėą‚Ėą ‚Ėą ‚ĖÄ‚ĖĄ‚ĖĄ ‚ĖĄ‚Ėą‚Ėą


# See https://wiki.hyprland.org/Configuring/Monitors/
monitor=,preferred,auto,1,mirror,eDP-1
monitor=HDMI-A-1,1920x1080@60,1920x0,1
monitor=DVI-D-1,1920x1080@60,0x0,1
monitor=eDP-1,1920x1080@60,1920x1080,1
#monitor=DP-4,1920x1080@60,1920x0,1
#monitor=DP-5,1920x1080@60,0x0,1

input {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more
    kb_layout = de
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =

    numlock_by_default = true

    follow_mouse = 1

    touchpad {
		disable_while_typing = true
        natural_scroll = true
		scroll_factor = 0.9
    }

    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.
}

ecosystem {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more
    no_update_news = true
}


# ‚ĖĄ‚ĖÄ‚ĖĄ ‚Ėą ‚Ėą ‚ĖÄ‚Ėą‚ĖÄ ‚ĖĄ‚ĖÄ‚ĖĄ ‚ĖĄ‚ĖÄ‚ĖÄ ‚ĖÄ‚Ėą‚ĖÄ ‚ĖĄ‚ĖÄ‚ĖĄ ‚Ėą‚ĖÄ‚ĖĄ ‚ĖÄ‚Ėą‚ĖÄ
# ‚Ėą‚ĖÄ‚Ėą ‚ĖÄ‚ĖĄ‚Ėą  ‚Ėą  ‚ĖÄ‚ĖĄ‚ĖÄ ‚ĖĄ‚Ėą‚Ėą  ‚Ėą  ‚Ėą‚ĖÄ‚Ėą ‚Ėą‚ĖÄ‚ĖĄ  ‚Ėą 


source = ~/.config/hypr/config/autostart.conf


# ‚Ėą‚ĖÄ‚ĖĄ ‚Ėą   ‚Ėą ‚Ėą ‚ĖĄ‚ĖÄ  ‚Ėą ‚Ėą‚ĖĄ ‚Ėą ‚ĖĄ‚ĖÄ‚ĖÄ
# ‚Ėą‚ĖÄ  ‚Ėą‚ĖĄ‚ĖĄ ‚ĖÄ‚ĖĄ‚Ėą ‚ĖÄ‚ĖĄ‚Ėą ‚Ėą ‚Ėą ‚ĖÄ‚Ėą ‚ĖĄ‚Ėą‚Ėą


# See https://wiki.hyprland.org/Plugins/Using-Plugins/ for more
source = ~/.config/hypr/hyprpm.conf


# ‚Ėą ‚Ėą ‚ĖĄ‚ĖÄ‚ĖÄ ‚Ėą‚Ėą‚ĖÄ ‚Ėą‚ĖÄ‚ĖĄ   ‚Ėą ‚Ėą‚ĖĄ ‚Ėą ‚ĖÄ‚Ėą‚ĖÄ ‚Ėą‚Ėą‚ĖÄ ‚Ėą‚ĖÄ‚ĖĄ ‚Ėą‚ĖÄ ‚ĖĄ‚ĖÄ‚ĖĄ ‚ĖĄ‚ĖÄ‚ĖÄ ‚Ėą‚Ėą‚ĖÄ
# ‚ĖÄ‚ĖĄ‚Ėą ‚ĖĄ‚Ėą‚Ėą ‚Ėą‚ĖĄ‚ĖĄ ‚Ėą‚ĖÄ‚ĖĄ   ‚Ėą ‚Ėą ‚ĖÄ‚Ėą  ‚Ėą  ‚Ėą‚ĖĄ‚ĖĄ ‚Ėą‚ĖÄ‚ĖĄ ‚Ėą‚ĖÄ ‚Ėą‚ĖÄ‚Ėą ‚ĖÄ‚ĖĄ‚ĖĄ ‚Ėą‚ĖĄ‚ĖĄ


general {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more
    gaps_in = 8
    gaps_out = 16
    #gaps_workspaces = 0
    border_size = 6
    col.active_border = rgba(EEB017CC) rgba(CB2211CC) rgba(CB1183CC) 30deg
    col.inactive_border = rgba(2f313cFF)
    layout = master
    allow_tearing = true
}

decoration {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more
    rounding = 16
    rounding_power = 2
    dim_modal = true
    dim_inactive = true
    dim_strength = 0.15
    dim_special = 0
    dim_around = 0.1
    active_opacity = 0.96
    inactive_opacity = 0.86
    fullscreen_opacity = 1
    blur {
        enabled = true
        size = 2
        passes = 4
        new_optimizations = true
    }
    shadow {
        enabled = false
        range = 8
        render_power = 2
        color = rgba(201C2880)
        color_inactive = rgba(00000000)
    }
}

animations {
    # See https://wiki.hyprland.org/Configuring/Animations/ for more
    enabled = true
    workspace_wraparound = false 

    bezier = easeInOutQuint, 0.4, 0.6, 0.2, 1.25
    bezier = easeOutCirc, 0, 0.55, 0.45, 1
    bezier = easeOutBack, 0.34, 1.56, 0.64, 1
    bezier = easeOutQuint, 0, 0.8, 0.5, 1
    bezier = easeInOutQuart, 0.76, 0, 0.24, 1

    animation = windows, 1, 2.5, easeInOutQuint, popin 80%
    animation = windowsOut, 1, 3, easeOutCirc, popin 90%
    animation = windowsMove, 1, 2, easeOutCirc
    animation = fade, 1, 2.5, easeInOutQuint
    animation = border, 1, 10, easeOutBack
    #animation = borderangle, 1, 52, easeInOutQuart, loop
    animation = workspaces, 1, 2.5, easeOutQuint
    animation = specialWorkspace, 1, 1.5, easeOutQuint
    animation = layers, 1, 2.5, easeInOutQuint, popin 90%

}

dwindle {
    # See https://wiki.hyprland.org/Configuring/Dwindle-Layout/ for more
    pseudotile = yes # master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
    preserve_split = yes # you probably want this
}

master {
    # See https://wiki.hyprland.org/Configuring/Master-Layout/ for more
    new_status = slave
    mfact = 0.58
    special_scale_factor = 0.4
}

gestures {
    # See https://wiki.hyprland.org/Configuring/Keywords/ for more
    gesture = 3, horizontal, workspace 
}

misc {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more
    disable_hyprland_logo = true
    mouse_move_enables_dpms = true
    key_press_enables_dpms = true
    on_focus_under_fullscreen = 2
    enable_anr_dialog = true
    anr_missed_pings = 6
}

binds {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more
    workspace_center_on = true
}

debug {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more
    disable_logs = false
}


